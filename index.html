<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Suman 💚</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(-45deg,#dff8e6,#c7f0d0,#b8ecc3,#eafdf0);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    position:relative;
    overflow-y:auto;
    overflow-x:hidden;
    padding:20px;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    gap:20px;
}

/* COUNTDOWN LAYER */
.countdown-layer{
    width:95%;
    max-width:700px;
    padding:30px 25px;
    text-align:center;
    background:rgba(255,255,255,.50);
    backdrop-filter:blur(25px);
    border-radius:30px;
    border:3px solid rgba(255,255,255,.7);
    box-shadow:0 25px 70px rgba(0,0,0,.25);
    position:relative;
    z-index:20;
    animation:slideDown 0.8s ease-out;
}

@keyframes slideDown{
    from{
        opacity:0;
        transform:translateY(-30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.countdown-title{
    font-family:'Great Vibes',cursive;
    font-size:2.4rem;
    font-weight:400;
    color:#2d8b57;
    margin-bottom:15px;
    animation:glow 2.5s infinite alternate;
    text-shadow:0 2px 10px rgba(45,139,87,.2);
}

@keyframes glow{
    from{text-shadow:0 0 10px rgba(169,239,187,.3), 0 2px 10px rgba(45,139,87,.2);}
    to{text-shadow:0 0 25px rgba(91,211,125,.5), 0 2px 10px rgba(45,139,87,.2);}
}

.countdown-subtitle{
    color:#4f6f59;
    font-size:1rem;
    font-weight:600;
    margin-bottom:5px;
    letter-spacing:1px;
}

.countdown-date{
    color:#2d8b57;
    font-size:0.9rem;
    margin-bottom:20px;
    font-weight:500;
}

.countdown-items{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

.countdown-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    background:rgba(255,255,255,.85);
    border-radius:15px;
    padding:15px 12px;
    min-width:75px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    animation:popIn 0.5s ease-out;
}

.countdown-item:nth-child(1){animation-delay:0.1s;}
.countdown-item:nth-child(2){animation-delay:0.2s;}
.countdown-item:nth-child(3){animation-delay:0.3s;}
.countdown-item:nth-child(4){animation-delay:0.4s;}

@keyframes popIn{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.countdown-value{
    font-size:2rem;
    font-weight:800;
    color:#ff2d55;
    line-height:1;
    text-shadow:0 2px 5px rgba(255,45,85,.2);
}

.countdown-name{
    font-size:0.75rem;
    font-weight:700;
    color:#4f6f59;
    margin-top:8px;
    text-transform:uppercase;
    letter-spacing:0.8px;
}

/* CARD LAYER */
.card{
    width:95%;
    max-width:600px;
    padding:25px 22px;
    text-align:center;
    background:rgba(255,255,255,.40);
    backdrop-filter:blur(20px);
    border-radius:25px;
    border:2px solid rgba(255,255,255,.6);
    box-shadow:0 20px 60px rgba(0,0,0,.2);
    animation:floatCard 4s ease-in-out infinite;
    position:relative;
    z-index:10;
    margin-bottom:30px;
    
    /* Initially hidden */
    display: none; 
}

@keyframes floatCard{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

h1{
    font-family:'Great Vibes',cursive;
    font-size:2.2rem;
    font-weight:400;
    color:#2d8b57;
    animation:glow 2.5s infinite alternate;
    margin:0;
    padding:0;
    line-height:1;
}

.subtitle{
    color:#4f6f59;
    font-weight:600;
    font-size:0.85rem;
    letter-spacing:1px;
    margin:5px 0;
}

.date-badge{
    display:inline-block;
    margin:8px 0;
    padding:6px 14px;
    background:rgba(99,199,122,.20);
    border:1.5px solid rgba(99,199,122,.4);
    border-radius:18px;
    color:#2d8b57;
    font-size:0.8rem;
    font-weight:600;
}

.message{
    margin:12px 0;
    color:#35543d;
    font-size:0.85rem;
    line-height:1.5;
    font-weight:300;
}

.highlight{
    color:#1d8c4f;
    font-weight:600;
    background:rgba(99,199,122,.1);
    padding:8px 10px;
    border-radius:8px;
    display:inline-block;
    margin:5px 0;
    font-size:0.85rem;
}

.heart{
    color:#ff2d55;
    font-size:1.6rem;
    animation:beat 1s infinite;
    display:inline-block;
    margin:3px 0;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.3);}
}

.footer{
    margin:10px 0;
    color:#45614e;
    font-size:0.8rem;
    font-weight:300;
}

.footer-love{
    color:#ff2d55;
    font-weight:bold;
    margin-top:5px;
    animation:beatSlow 1.5s infinite;
    font-size:0.9rem;
}

@keyframes beatSlow{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.1);}
}

.button-group{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:10px;
}

    border:none;

    background:linear-gradient(135deg,#63c77a,#4aae63);
    color:white;
