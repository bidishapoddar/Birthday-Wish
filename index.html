<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Suman 💚</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
}

body{
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#dff8e6,#c7f0d0,#b8ecc3,#eafdf0);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    position:relative;
    overflow:hidden;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:95%;
    max-width:600px;
    padding:20px 25px;
    text-align:center;
    background:rgba(255,255,255,.40);
    backdrop-filter:blur(20px);
    border-radius:25px;
    border:2px solid rgba(255,255,255,.6);
    box-shadow:0 20px 60px rgba(0,0,0,.2);
    animation:floatCard 4s ease-in-out infinite;
    position:relative;
    z-index:10;
}

@keyframes floatCard{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

h1{
    font-family:'Great Vibes',cursive;
    font-size:2.2rem;
    font-weight:400;
    color:#2d8b57;
    animation:glow 2.5s infinite alternate;
    margin:0;
    padding:0;
    line-height:1;
}

@keyframes glow{
    from{text-shadow:0 0 10px rgba(169,239,187,.3);}
    to{text-shadow:0 0 25px rgba(91,211,125,.5);}
}

.subtitle{
    color:#4f6f59;
    font-weight:600;
    font-size:0.8rem;
    letter-spacing:1px;
    margin:5px 0;
}

.date-badge{
    display:inline-block;
    margin:8px 0;
    padding:5px 12px;
    background:rgba(99,199,122,.15);
    border:1px solid rgba(99,199,122,.3);
    border-radius:18px;
    color:#2d8b57;
    font-size:0.75rem;
    font-weight:600;
}

.message{
    margin:15px 0;
    color:#35543d;
    font-size:0.85rem;
    line-height:1.5;
    font-weight:300;
}

.highlight{
    color:#1d8c4f;
    font-weight:600;
    background:rgba(99,199,122,.1);
    padding:8px 10px;
    border-radius:8px;
    display:inline-block;
    margin:5px 0;
    font-size:0.85rem;
}

.heart{
    color:#ff2d55;
    font-size:1.6rem;
    animation:beat 1s infinite;
    display:inline-block;
    margin:3px 0;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.3);}
}

.footer{
    margin:12px 0;
    color:#45614e;
    font-size:0.8rem;
    font-weight:300;
}

.footer-love{
    color:#ff2d55;
    font-weight:bold;
    margin-top:5px;
    animation:beatSlow 1.5s infinite;
}

@keyframes beatSlow{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.1);}
}

button{
    margin-top:12px;
    padding:10px 24px;
    border:none;
    border-radius:35px;
    background:linear-gradient(135deg,#63c77a,#4aae63);
    color:white;
    cursor:pointer;
    font-size:0.85rem;
    font-weight:600;
    transition:all 0.3s ease;
    box-shadow:0 6px 20px rgba(99,199,122,.3);
    position:relative;
    overflow:hidden;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 30px rgba(99,199,122,.4);
}

.balloon{
    position:fixed;
    bottom:-80px;
    width:30px;
    animation:rise linear infinite;
}

.balloon::before{
    content:"";
    position:absolute;
    width:30px;
    height:36px;
    border-radius:50% 50% 50% 40%;
    background:linear-gradient(135deg,#95e6a7,#7fd499);
}

.balloon::after{
    content:"";
    position:absolute;
    left:14px;
    top:36px;
    width:1px;
    height:40px;
    background:#888;
}

@keyframes rise{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-110vh);
        opacity:0;
    }
}

.sparkle{
    position:fixed;
    width:4px;
    height:4px;
    border-radius:50%;
    background:white;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:.1;}
    50%{opacity:1;}
}

.floatHeart{
    position:fixed;
    color:#ff2d55;
    font-size:18px;
    animation:heartFloat linear infinite;
    opacity:.7;
}

@keyframes heartFloat{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }
    to{
        transform:translateY(-100vh) scale(1);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">
<h1>Happy Birthday! 🎂</h1>
<div class="subtitle">A Special Day</div>
<div class="date-badge">13 July 💚</div>

<div class="message">
<div>To the most amazing person! 💚</div>
<div style="margin:8px 0;">May your day be filled with<br>happiness, joy & endless love.</div>
<div style="margin:8px 0;">
<span class="highlight">Keep smiling, keep shining!</span>
</div>
<div>You are deeply loved! 💕</div>
<div style="margin:5px 0;"><span class="heart">❤️</span></div>
</div>

<div class="footer">
Happy Birthday!
<div class="footer-love">❤️ Have a wonderful day! ❤️</div>
</div>

<button onclick="celebrate()">Magic ✨</button>
</div>

<script>

// Balloons
for(let i=0;i<12;i++){
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"vw";
    b.style.animationDuration=(7+Math.random()*5)+"s";
    b.style.animationDelay=Math.random()*4+"s";
    document.body.appendChild(b);
}

// Sparkles
for(let i=0;i<35;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    s.style.animationDelay=Math.random()*2+"s";
    document.body.appendChild(s);
}

// Floating Hearts
const hearts=["❤️","💕","💖","💗"];
for(let i=0;i<15;i++){
    let h=document.createElement("div");
    h.className="floatHeart";
    h.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(6+Math.random()*5)+"s";
    h.style.animationDelay=Math.random()*3+"s";
    h.style.fontSize=(14+Math.random()*12)+"px";
    document.body.appendChild(h);
}

// Confetti
function celebrate(){
    const colors=["#ff2d55","#ff6b81","#63c77a","#a4f0b5","#ffb347","#87ceeb","#ffc0cb","#ffffff"];
    for(let i=0;i<150;i++){
        let c=document.createElement("div");
        c.style.position="fixed";
        c.style.left=Math.random()*100+"vw";
        c.style.top="-20px";
        c.style.width=Math.random()*5+5+"px";
        c.style.height=Math.random()*5+5+"px";
        c.style.borderRadius="50%";
        c.style.background=colors[Math.floor(Math.random()*colors.length)];
        c.style.pointerEvents="none";
        document.body.appendChild(c);
        
        let duration=2000+Math.random()*1000;
        c.animate([
            {transform:"translateY(0) rotate(0deg)",opacity:1},
            {transform:`translate(${(Math.random()-0.5)*300}px,${window.innerHeight+100}px) rotate(${Math.random()*720}deg)`,opacity:0}
        ],{duration:duration,easing:"ease-out"});
        setTimeout(()=>c.remove(),duration);
    }
}

</script>

</body>
</html>
